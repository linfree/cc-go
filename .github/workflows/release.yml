name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: .exe
            ldflags: -H windowsgui
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: ''
            ldflags: ''
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: ''
            ldflags: ''
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ''
            ldflags: ''

    runs-on: ${{ matrix.runner }}
    env:
      CGO_ENABLED: 1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: Build frontend
        run: cd web && npm install && npm run build

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "${{ matrix.ldflags }}" -o cc-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/cc-go/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cc-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List files
        run: ls -la dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
