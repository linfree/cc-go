name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: .exe
            ldflags: -H windowsgui -s -w
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: ''
            ldflags: -s -w
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: ''
            ldflags: -s -w
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ''
            ldflags: -s -w
            cgo: 0

    runs-on: ${{ matrix.runner }}
    env:
      CGO_ENABLED: ${{ matrix.cgo || 1 }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        if: matrix.goos == 'linux' && matrix.cgo == 1
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: Build frontend
        run: cd web && npm install && npm run build

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "${{ matrix.ldflags }}" -o cc-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/cc-go/

      - name: Package macOS .app
        if: matrix.goos == 'darwin'
        run: |
          mkdir -p "cc-go.app/Contents/MacOS"
          mkdir -p "cc-go.app/Contents/Resources"
          cp cc-go-${{ matrix.goos }}-${{ matrix.goarch }} "cc-go.app/Contents/MacOS/cc-go"
          cp cmd/cc-go/Info.plist "cc-go.app/Contents/"
          cp cmd/cc-go/cc-go.icns "cc-go.app/Contents/Resources/"
          zip -r cc-go-${{ matrix.goos }}-${{ matrix.goarch }}.zip cc-go.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            cc-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
            cc-go-${{ matrix.goos }}-${{ matrix.goarch }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List files
        run: ls -la dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            ## 下载

            | 平台 | 文件 |
            |------|------|
            | Windows | `cc-go-windows-amd64.exe` |
            | macOS (Intel) | `cc-go-darwin-amd64.zip` |
            | macOS (Apple Silicon) | `cc-go-darwin-arm64.zip` |
            | Linux | `cc-go-linux-amd64` |

            ## macOS 用户注意

            下载 `.zip` 解压后，由于应用未签名，需在终端运行：

            ```bash
            xattr -cr cc-go.app
            ```

            然后即可正常打开。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
